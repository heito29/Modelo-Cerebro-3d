<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cérebro 3D — Neuroanatomia FCMMG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#f7f3ee;
  --cream2:#ede8e0;
  --warm-dark:#1c1917;
  --warm-mid:#57534e;
  --warm-light:#a8a29e;
  --white:#ffffff;
  --accent:#c0392b;
  --accent2:#e8b84b;
  --sidebar:270px;
  --panel:330px;
  --topbar:52px;
}
html,body{height:100%;overflow:hidden;background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--warm-dark)}

/* ═══ TOPBAR ═══ */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);z-index:100;
  background:var(--white);border-bottom:1px solid var(--cream2);
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
.t-logo{display:flex;align-items:center;gap:9px}
.t-icon{
  width:30px;height:30px;border-radius:7px;background:var(--accent);
  display:grid;place-items:center;flex-shrink:0;
}
.t-icon svg{width:17px;height:17px;fill:#fff}
.t-title{font-size:14px;font-weight:600;color:var(--warm-dark);letter-spacing:-.2px}
.t-sub{font-size:11px;color:var(--warm-light);margin-left:1px}
.t-gap{flex:1}
.t-layers{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--warm-mid)}
.t-layers strong{color:var(--warm-dark);font-weight:600}

/* ═══ LAYOUT ═══ */
#app{
  position:fixed;top:var(--topbar);left:0;right:0;bottom:0;
  display:flex;
}

/* ═══ SIDEBAR ═══ */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--white);border-right:1px solid var(--cream2);
  display:flex;flex-direction:column;overflow:hidden;z-index:50;
}
.sb-head{padding:14px 15px 10px;border-bottom:1px solid var(--cream2);flex-shrink:0}
.sb-search{
  width:100%;padding:7px 10px;border:1px solid var(--cream2);
  border-radius:8px;font-size:12.5px;background:var(--cream);
  color:var(--warm-dark);outline:none;font-family:inherit;
  transition:border-color .15s;
}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--warm-light)}
.sb-list{flex:1;overflow-y:auto;padding-bottom:12px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--cream2);border-radius:3px}
.sb-group-title{
  padding:12px 15px 5px;font-size:10px;font-weight:600;
  letter-spacing:.9px;text-transform:uppercase;color:var(--warm-light);
}
.sb-btn{
  display:flex;align-items:center;gap:9px;padding:7px 15px;
  border:none;background:none;width:100%;text-align:left;
  cursor:pointer;transition:background .12s;position:relative;
}
.sb-btn:hover{background:var(--cream)}
.sb-btn.active{background:#fdf0ee}
.sb-btn.active .sb-lbl{color:var(--accent);font-weight:600}
.sb-btn.active::before{
  content:'';position:absolute;left:0;top:3px;bottom:3px;
  width:3px;border-radius:0 3px 3px 0;background:var(--accent);
}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:transform .2s}
.sb-btn:hover .sb-dot,.sb-btn.active .sb-dot{transform:scale(1.25)}
.sb-lbl{font-size:13px;color:var(--warm-dark);line-height:1.2;font-weight:400}
.sb-lat{font-size:10.5px;color:var(--warm-light);font-style:italic}

/* Layer badge in sidebar */
.sb-layer{
  display:inline-block;padding:1px 6px;border-radius:4px;
  font-size:9.5px;font-weight:600;letter-spacing:.4px;
  text-transform:uppercase;margin-left:4px;vertical-align:middle;
}
.lyr-0{background:#fde8e5;color:#c0392b}  /* cortex - red */
.lyr-1{background:#fff8e1;color:#b7821a}  /* subcortical */
.lyr-2{background:#e8f5e9;color:#2e7d32}  /* deep */

/* ═══ CANVAS ZONE ═══ */
#canvas-zone{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 40%, #f0ebe3 0%, #e8e2d8 60%, #ddd6ca 100%);
}
#canvas-zone canvas{display:block;width:100%!important;height:100%!important}

/* Float label */
#tip{
  position:absolute;background:rgba(28,25,23,.85);color:#fff;
  font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;
  pointer-events:none;opacity:0;transition:opacity .1s;z-index:20;
  white-space:nowrap;backdrop-filter:blur(8px);letter-spacing:.1px;
  font-family:'DM Sans',sans-serif;
}

/* Transparency slider */
#transparency-ctrl{
  position:absolute;left:50%;bottom:70px;transform:translateX(-50%);
  z-index:20;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.9);border:1px solid var(--cream2);
  border-radius:40px;padding:8px 18px;backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.tc-label{font-size:11px;color:var(--warm-mid);white-space:nowrap;font-weight:500}
#alpha-slider{
  width:130px;accent-color:var(--accent);cursor:pointer;
}
.tc-val{font-size:11px;font-weight:600;color:var(--accent);min-width:28px;text-align:right}

/* View buttons */
#view-btns{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:5px;
  background:rgba(255,255,255,.9);border:1px solid var(--cream2);
  border-radius:40px;padding:5px 8px;backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.vb{
  padding:6px 14px;border-radius:30px;border:none;
  background:transparent;font-size:11.5px;font-weight:500;
  color:var(--warm-mid);cursor:pointer;transition:all .15s;
  font-family:'DM Sans',sans-serif;
}
.vb:hover{background:var(--cream);color:var(--warm-dark)}
.vb.active{background:var(--warm-dark);color:#fff}

/* Isolate */
#iso-btn{
  position:absolute;right:16px;bottom:20px;z-index:20;
  padding:8px 16px;border-radius:30px;
  border:1.5px solid var(--accent);background:var(--white);
  color:var(--accent);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;
  box-shadow:0 2px 8px rgba(192,57,43,.15);display:none;
}
#iso-btn.vis{display:block}
#iso-btn:hover{background:var(--accent);color:#fff}

/* Rotate hint */
#hint{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--warm-mid);z-index:10;
  pointer-events:none;white-space:nowrap;
  background:rgba(255,255,255,.7);padding:4px 12px;border-radius:20px;
  transition:opacity 1s;
}
#hint.gone{opacity:0}

/* ═══ INFO PANEL ═══ */
#panel{
  width:0;flex-shrink:0;
  background:var(--white);border-left:1px solid var(--cream2);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .38s cubic-bezier(.16,1,.3,1);z-index:50;
}
#panel.open{width:var(--panel)}

.p-hero{
  padding:22px 20px 16px;border-bottom:1px solid var(--cream2);
  flex-shrink:0;position:relative;
}
.p-close{
  position:absolute;top:14px;right:14px;width:26px;height:26px;
  border-radius:50%;border:1px solid var(--cream2);background:var(--cream);
  display:grid;place-items:center;cursor:pointer;
  font-size:13px;color:var(--warm-mid);transition:all .15s;
}
.p-close:hover{background:var(--cream2);color:var(--warm-dark)}
.p-tag{font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;margin-bottom:6px}
.p-name{font-family:'Lora',serif;font-size:22px;font-weight:500;line-height:1.15;color:var(--warm-dark);margin-bottom:3px}
.p-latin{font-size:12px;font-style:italic;color:var(--warm-light)}

.p-scroll{flex:1;overflow-y:auto;padding:16px 20px 24px}
.p-scroll::-webkit-scrollbar{width:3px}
.p-scroll::-webkit-scrollbar-thumb{background:var(--cream2);border-radius:3px}

.s-title{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--warm-light);margin:18px 0 8px}
.s-title:first-child{margin-top:0}
.s-desc{font-size:13px;line-height:1.78;color:#3d3530}

.s-struct{
  display:flex;gap:8px;align-items:flex-start;
  padding:6px 0;border-bottom:1px solid var(--cream2);
  font-size:12.5px;color:#4a4540;line-height:1.5;
}
.s-struct:last-child{border-bottom:none}
.s-struct::before{
  content:'';width:5px;height:5px;border-radius:50%;
  flex-shrink:0;margin-top:5px;opacity:.75;
}

.s-funcs{display:flex;flex-wrap:wrap;gap:5px}
.s-func{padding:4px 10px;border-radius:5px;font-size:11.5px;font-weight:500}
.fa{background:#fef3c7;color:#92400e}
.fb{background:#d1fae5;color:#065f46}
.fc{background:#ede9fe;color:#4c1d95}
.fd{background:#fee2e2;color:#991b1b}
.fe{background:#e0f2fe;color:#0c4a6e}

.s-clinical{
  background:#fdf5f4;border:1px solid #f5c6c0;border-radius:9px;padding:12px;
}
.s-clinical p{font-size:12.5px;line-height:1.75;color:#7a2e25}

/* Layer indicator in panel */
.p-layer-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:600;
  letter-spacing:.3px;margin-bottom:10px;
}

/* ═══ LOADING ═══ */
#loading{
  position:fixed;inset:0;z-index:999;
  background:var(--white);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
}
.ld-ring{
  width:42px;height:42px;border-radius:50%;
  border:3px solid var(--cream2);border-top-color:var(--accent);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{font-size:12px;color:var(--warm-light);letter-spacing:.3px}
</style>
</head>
<body>

<div id="loading"><div class="ld-ring"></div><div class="ld-txt">Construindo modelo anatômico...</div></div>

<div id="topbar">
  <div class="t-logo">
    <div class="t-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3C8.5 3 6 6 6 9.5c0 2.1.9 4 2.4 5.3L8 17h8l-.4-2.2C17.1 13.5 18 11.6 18 9.5 18 6 15.5 3 12 3zm0 2c2.4 0 4 2.2 4 4.5 0 1.5-.7 2.9-1.8 3.8L14 15h-4l-.2-1.7C8.7 12.4 8 11 8 9.5 8 7.2 9.6 5 12 5zm-2 13h4v.5a2 2 0 0 1-4 0V18z"/></svg>
    </div>
    <div><div class="t-title">Neuroanatomia 3D</div><div class="t-sub">FCMMG · Cérebro Interativo</div></div>
  </div>
  <div class="t-gap"></div>
  <div class="t-layers">
    <div style="width:8px;height:8px;border-radius:50%;background:#c0392b;opacity:.9"></div><span>Córtex</span>
    <div style="width:8px;height:8px;border-radius:50%;background:#e8b84b;opacity:.9;margin-left:6px"></div><span>Subcortical</span>
    <div style="width:8px;height:8px;border-radius:50%;background:#4caf7d;opacity:.9;margin-left:6px"></div><span>Profundo</span>
    <span style="margin-left:10px;color:var(--warm-light)">Use o slider para ver as camadas internas</span>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sb-head">
      <input class="sb-search" id="search" type="text" placeholder="Buscar região..." autocomplete="off">
    </div>
    <div class="sb-list" id="sb-list"></div>
  </div>

  <div id="canvas-zone">
    <div id="hint">Arraste para rotacionar · Scroll para zoom</div>
    <div id="tip"></div>

    <div id="transparency-ctrl">
      <span class="tc-label">🔍 Transparência do córtex</span>
      <input type="range" id="alpha-slider" min="5" max="100" value="100" step="1">
      <span class="tc-val" id="alpha-val">100%</span>
    </div>

    <div id="view-btns">
      <button class="vb active" data-v="front">Frontal</button>
      <button class="vb" data-v="lat-r">Lat. Direita</button>
      <button class="vb" data-v="lat-l">Lat. Esquerda</button>
      <button class="vb" data-v="top">Superior</button>
      <button class="vb" data-v="post">Posterior</button>
      <button class="vb" data-v="inf">Inferior</button>
    </div>
    <button id="iso-btn" onclick="toggleIso()">Isolar região</button>
  </div>

  <div id="panel">
    <div class="p-hero">
      <button class="p-close" onclick="deselect()">✕</button>
      <div class="p-tag" id="p-tag"></div>
      <div class="p-name" id="p-name"></div>
      <div class="p-latin" id="p-lat"></div>
    </div>
    <div class="p-scroll" id="p-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// REGION DATA
// ═══════════════════════════════════════════════════════════════
const R = [
  // layer 0 = cortex (outer), layer 1 = subcortical, layer 2 = deep/internal
  {
    id:'frontal',layer:0,group:'Telencéfalo — Córtex',
    name:'Lobo Frontal',latin:'Lobus frontalis',
    color:'#e8826a',hex:0xe8826a,
    desc:'O maior dos lobos cerebrais. Controla motricidade voluntária, linguagem expressiva (Área de Broca), funções executivas, personalidade, julgamento e planejamento.',
    structs:['Giro pré-central — área motora primária','Giro frontal superior, médio e inferior','Área de Broca — hem. esq., giro frontal inferior','Área pré-frontal — planejamento, cognição, personalidade','Sulco central de Rolando (limite posterior)','Sulco olfatório, bulbo e trato olfatório (face inferior)'],
    funcs:[{l:'Motricidade voluntária',c:'fb'},{l:'Área de Broca / fala',c:'fc'},{l:'Funções executivas',c:'fc'},{l:'Personalidade',c:'fa'},{l:'Memória de trabalho',c:'fc'},{l:'Olfação',c:'fe'}],
    clinical:'Afasia de Broca (lesão giro frontal inferior esq.): fala não-fluente, compreensão preservada. Síndrome frontal (lesão pré-frontal): desinibição, impulsividade, perda de julgamento (caso Phineas Gage).'
  },
  {
    id:'parietal',layer:0,group:'Telencéfalo — Córtex',
    name:'Lobo Parietal',latin:'Lobus parietalis',
    color:'#5bb89a',hex:0x5bb89a,
    desc:'Integra sensibilidade somática, percepção espacial e do esquema corporal. Contém a área somestésica primária (giro pós-central) e a área de compreensão da linguagem (Wernicke).',
    structs:['Giro pós-central — área somestésica primária','Lóbulo parietal superior — integração sensório-motora','Giro angular — Área de Wernicke','Giro supramarginal','Sulco pós-central e intraparietal'],
    funcs:[{l:'Sensibilidade somática',c:'fe'},{l:'Área de Wernicke',c:'fc'},{l:'Percepção espacial',c:'fc'},{l:'Esquema corporal',c:'fc'},{l:'Reconhecimento tátil',c:'fe'}],
    clinical:'Afasia de Wernicke (lesão lóbulo parietal inf. esq.): fala fluente sem sentido, sem compreensão. Negligência hemiespacial (lesão parietal dir.): ignora hemicorpo e hemiambiente contralaterais.'
  },
  {
    id:'temporal',layer:0,group:'Telencéfalo — Córtex',
    name:'Lobo Temporal',latin:'Lobus temporalis',
    color:'#d4a83a',hex:0xd4a83a,
    desc:'Processa audição primária e integra memória episódica e semântica. Face medial contém hipocampo, amígdala e úncus (sistema límbico).',
    structs:['Giro temporal superior — audição primária (giros de Heschl)','Giro temporal médio e inferior','Úncus — córtex olfativo primário','Giro para-hipocampal','Sulco lateral de Sylvius (limite superior)'],
    funcs:[{l:'Audição primária',c:'fe'},{l:'Memória episódica',c:'fc'},{l:'Olfação / úncus',c:'fe'},{l:'Reconhecimento facial',c:'fc'},{l:'Emoção / amígdala',c:'fa'}],
    clinical:'Epilepsia do lobo temporal: auras olfativas (úncus), automatismos. Lesão bilateral do hipocampo: amnésia anterógrada (caso H.M.). Síndrome de Klüver-Bucy: lesão bilateral da amígdala.'
  },
  {
    id:'occipital',layer:0,group:'Telencéfalo — Córtex',
    name:'Lobo Occipital',latin:'Lobus occipitalis',
    color:'#c47ab8',hex:0xc47ab8,
    desc:'Centro cortical da visão. Recebe informações visuais via trato óptico → corpo geniculado lateral → radiações ópticas → córtex visual primário (V1) no sulco calcarino.',
    structs:['Sulco calcarino — córtex visual primário V1 (área 17)','Cúneo (acima do sulco calcarino)','Giro lingual (abaixo do sulco calcarino)','Sulco parietoccipital','Áreas de associação visual V2–V5'],
    funcs:[{l:'Visão primária V1',c:'fe'},{l:'Processamento visual',c:'fc'},{l:'Reconhecimento de formas',c:'fc'},{l:'Percepção de cores V4',c:'fb'},{l:'Movimento V5/MT',c:'fb'}],
    clinical:'Lesão sulco calcarino: hemianopsia homônima contralateral (visão macular poupada). Lesões bilaterais: cegueira cortical (reflexo pupilar preservado). Aura visual da enxaqueca: alastramento cortical occipital.'
  },
  {
    id:'insula',layer:0,group:'Telencéfalo — Córtex',
    name:'Lobo da Ínsula',latin:'Insula (Lobus insularis)',
    color:'#9b7ed4',hex:0x9b7ed4,
    desc:'Córtex oculto no fundo da fossa lateral de Sylvius. Relaciona-se à gustação, interoceptação, consciência visceral, dor e processamento emocional.',
    structs:['Giros longos (posteriores)','Giros curtos (anteriores)','Sulco central da ínsula','Sulco circular (limite com opérculos)'],
    funcs:[{l:'Gustação',c:'fe'},{l:'Interoceptação',c:'fc'},{l:'Dor visceral',c:'fd'},{l:'Consciência corporal',c:'fc'},{l:'Emoção / nojo',c:'fa'}],
    clinical:'Lesões: assomatognosia (não reconhecer a própria doença). Ínsula anterior: rede de empatia e consciência dos estados internos do corpo.'
  },
  {
    id:'corpus_callosum',layer:0,group:'Telencéfalo — Comissuras',
    name:'Corpo Caloso',latin:'Corpus callosum',
    color:'#d8d0c0',hex:0xd8d0c0,
    desc:'Maior comissura do encéfalo (~200 milhões de axônios). Conecta os hemisférios, permite integração e transferência de informações inter-hemisférica. Visível na face medial.',
    structs:['Rostro (anterior inferior)','Joelho (genu) — conecta lobos frontais','Tronco — porção central','Esplênio — porção posterior alargada','Septo pelúcido (separa ventrículos laterais)'],
    funcs:[{l:'Comunicação inter-hemisférica',c:'fc'},{l:'Integração bimanual',c:'fb'},{l:'Transferência de aprendizado',c:'fc'}],
    clinical:'Calosotomia (split-brain): trata epilepsia refratária. EM: lesões no corpo caloso (dedos de Dawson em RM). Agenesia: geralmente assintomática ou leve dificuldade bimanual.'
  },
  {
    id:'cingulate',layer:0,group:'Sistema Límbico',
    name:'Giro do Cíngulo',latin:'Gyrus cinguli',
    color:'#6ac87a',hex:0x6ac87a,
    desc:'Componente central do sistema límbico. Corre em arco sobre o corpo caloso. Cíngulo anterior: atenção e emoção. Cíngulo posterior: memória e orientação espacial.',
    structs:['Sulco do corpo caloso (limite inferior)','Sulco do cíngulo (limite superior)','Ístmo do giro do cíngulo','Cíngulo anterior (ACC) — atenção, conflito','Cíngulo posterior (PCC) — memória espacial'],
    funcs:[{l:'Atenção e conflito',c:'fc'},{l:'Regulação emocional',c:'fa'},{l:'Motivação',c:'fa'},{l:'Processamento da dor',c:'fd'},{l:'Memória episódica',c:'fc'}],
    clinical:'Cingulotomia anterior: neurocirurgia para depressão e TOC refratários. Lesão bilateral ACC: síndrome acinético-muda (sem iniciativa motora ou verbal).'
  },
  // SUBCORTICAL (layer 1)
  {
    id:'thalamus',layer:1,group:'Diencéfalo — Subcortical',
    name:'Tálamo',latin:'Thalamus',
    color:'#5ba8d8',hex:0x5ba8d8,
    desc:'Principal estação de retransmissão sensitiva ao córtex (exceto olfato). Par de massas ovoides de substância cinzenta, formando as paredes laterais do III ventrículo.',
    structs:['Tubérculo anterior','Aderência intertalâmica','Pulvinar (proeminência posterior)','Corpo geniculado lateral — via visual','Corpo geniculado medial — via auditiva','Trígono das hábênulas (epitálamo)'],
    funcs:[{l:'Relay sensitivo (exceto olfato)',c:'fe'},{l:'Controle motor',c:'fb'},{l:'Memória',c:'fc'},{l:'Ativação cortical / consciência',c:'fc'},{l:'Ciclo sono-vigília',c:'fc'}],
    clinical:'CGL: retransmite visão ao córtex occipital. CGM: retransmite audição ao córtex temporal. AVC talâmico: síndrome de Déjerine-Roussy (dor talâmica). Lesão do núcleo dorsomedial: amnésia.'
  },
  {
    id:'hypothalamus',layer:1,group:'Diencéfalo — Subcortical',
    name:'Hipotálamo',latin:'Hypothalamus',
    color:'#e07840',hex:0xe07840,

function regMesh(id, mesh){
  mesh.userData.rid = id;
  mesh.castShadow=true; mesh.receiveShadow=true;

  if(!meshMap[id]) meshMap[id]=[];

  return mesh;
}

// Bumpy sphere — simulates gyri/sulci
function gyratedSphere(rx,ry,rz, freqs, segs=80){
  const geo = new THREE.SphereGeometry(1.0, segs, segs);
  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const l=Math.sqrt(x*x+y*y+z*z);
    const nx=x/l,ny=y/l,nz=z/l;
    const phi=Math.atan2(nz,nx), th=Math.acos(Math.max(-1,Math.min(1,ny)));
    let b=0;
    for(let [fp,ft,ph,a] of freqs) b+=a*Math.sin(phi*fp+th*ft+ph);
    const r=1+b;
    pos.setXYZ(i, nx*r*rx, ny*r*ry, nz*r*rz);
  }
  geo.computeVertexNormals();
  return geo;
}

function mat(hex, rough=0.72, opac=1){
  return new THREE.MeshStandardMaterial({
    color:hex, roughness:rough, metalness:0.025,
    transparent:opac<1, opacity:opac, side:THREE.FrontSide
  });
}
function matDbl(hex, rough=0.65, opac=1){

  });
}

  const g2=new THREE.CylinderGeometry(0.65,0.58,0.82,24);
  const m2=new THREE.Mesh(g2,mat(0xb88868)); m2.rotation.x=0.3; m2.position.set(0,-2.02,-0.68);
  regMesh('brainstem',m2);
  // Medulla
  const g3=new THREE.CylinderGeometry(0.46,0.34,1.05,24);
  const m3=new THREE.Mesh(g3,mat(0xa87858)); m3.rotation.x=0.3; m3.position.set(0,-2.76,-0.9);
  regMesh('brainstem',m3);
}

// ═══════════════════════════════════════════════════════════════
// TRANSPARENCY SYSTEM
// ═══════════════════════════════════════════════════════════════
// Layer 0 (cortex) = affected by alpha slider
const cortexIds = new Set(R.filter(r=>r.layer===0).map(r=>r.id));

const alphaSlider = document.getElementById('alpha-slider');
const alphaVal = document.getElementById('alpha-val');

// Store original opacities
const origOpac = {};
allMeshes.forEach(m=>{
  origOpac[m.uuid] = 1.0;
  // ventricles and V3 start semi-transparent
  if(m.userData.rid==='ventricles'||m.userData.rid==='v3'){
    origOpac[m.uuid]=0.72;
    m.material.opacity=0.72;
    m.material.transparent=true;
  }
});

function applyCortexAlpha(pct){
  const alpha = pct/100;
  allMeshes.forEach(m=>{
    const id=m.userData.rid;
    if(cortexIds.has(id)){
      const base=origOpac[m.uuid];
      m.material.opacity = alpha * base;
      m.material.transparent = alpha < 0.999;
      m.material.side = alpha<0.6 ? THREE.DoubleSide : THREE.FrontSide;
      // Show wireframe-like effect at very low opacity
      m.material.depthWrite = alpha > 0.15;
    }
  });
}

alphaSlider.addEventListener('input',e=>{
  const v=parseInt(e.target.value);
  alphaVal.textContent=v+'%';
  applyCortexAlpha(v);
});

// ═══════════════════════════════════════════════════════════════
// SELECTION & HIGHLIGHT
// ═══════════════════════════════════════════════════════════════
let selId=null, isIso=false;
const isoBtn=document.getElementById('iso-btn');

function getOrigColor(id){ return BY_ID[id]?.hex ?? 0xccbbaa; }

function clearHighlight(){
  allMeshes.forEach(m=>{
    m.material.color.setHex(getOrigColor(m.userData.rid));
    m.material.emissive.setHex(0x000000);
    m.material.emissiveIntensity=0;
    // restore cortex alpha
    const id=m.userData.rid;
    if(cortexIds.has(id)){
      const a=parseInt(alphaSlider.value)/100;
      m.material.opacity=a;
      m.material.transparent=a<0.999;
    } else if(id==='ventricles'||id==='v3'){
      m.material.opacity=0.72;
    } else {
      m.material.opacity=1;
      m.material.transparent=false;
    }
  });
}

function applySelection(id){
  const a=parseInt(alphaSlider.value)/100;
  allMeshes.forEach(m=>{
    const mid=m.userData.rid;
    if(mid===id){
      m.material.color.setHex(getOrigColor(mid));
      m.material.emissive.setHex(getOrigColor(mid));
      m.material.emissiveIntensity=0.2;
      m.material.opacity = mid==='ventricles'||mid==='v3' ? 0.9 : 1.0;
      m.material.transparent = false;
    } else {
      m.material.color.setHex(getOrigColor(mid));
      m.material.emissive.setHex(0x000000);
      m.material.emissiveIntensity=0;
      const isCortex=cortexIds.has(mid);
      const base = mid==='ventricles'||mid==='v3' ? 0.72 : (isCortex ? a : 1);
      m.material.opacity = Math.min(base, 0.22);
      m.material.transparent=true;
    }
  });
}

function selectRegion(id){
  if(!BY_ID[id]) return;
  if(isIso){ endIso(); }
  if(selId===id){ deselect(); return; }
  selId=id;
  applySelection(id);
  updateSidebarActive(id);
  openPanel(id);
  isoBtn.classList.add('vis');
}

function deselect(){
  selId=null; isIso=false;
  clearHighlight();
  updateSidebarActive(null);
  document.getElementById('panel').classList.remove('open');
  isoBtn.classList.remove('vis');
  isoBtn.textContent='Isolar região';
}
window.deselect=deselect;

function endIso(){
  isIso=false;
  allMeshes.forEach(m=>m.visible=true);
  isoBtn.textContent='Isolar região';
  if(selId) applySelection(selId);
}

function toggleIso(){
  if(!selId) return;
  isIso=!isIso;
  if(isIso){
    isoBtn.textContent='Mostrar tudo';
    allMeshes.forEach(m=>{
      m.visible = m.userData.rid===selId;
    });
  } else {
    endIso();
  }
}
window.toggleIso=toggleIso;

// ═══════════════════════════════════════════════════════════════
// RAYCASTING
// ═══════════════════════════════════════════════════════════════
const rc=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const tip=document.getElementById('tip');
let hoverIdPrev=null;

function pxToNDC(e){
  const r=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;
  mouse.y=-((e.clientY-r.top)/r.height)*2+1;
}

renderer.domElement.addEventListener('mousemove',e=>{
  pxToNDC(e);
  rc.setFromCamera(mouse,camera);
  const vis=allMeshes.filter(m=>m.visible && m.material.opacity>0.05);
  const hits=rc.intersectObjects(vis,false);
  if(hits.length){
    const id=hits[0].object.userData.rid;
    renderer.domElement.style.cursor='pointer';
    const d=BY_ID[id];
    tip.textContent=d?d.name:id;
    const r=zone.getBoundingClientRect();
    tip.style.left=(e.clientX-r.left+14)+'px';
    tip.style.top=(e.clientY-r.top-12)+'px';
    tip.style.opacity='1';
    if(!selId && id!==hoverIdPrev){
      allMeshes.forEach(m=>{
        const mid=m.userData.rid;
        m.material.emissive.setHex(mid===id?(BY_ID[mid]?.hex??0):0);
        m.material.emissiveIntensity=mid===id?0.14:0;
      });
    }
    hoverIdPrev=id;
  } else {
    renderer.domElement.style.cursor='grab';
    tip.style.opacity='0';
    if(!selId){ allMeshes.forEach(m=>{m.material.emissive.setHex(0);m.material.emissiveIntensity=0;}); }
    hoverIdPrev=null;
  }
});

renderer.domElement.addEventListener('click',e=>{
  pxToNDC(e);
  rc.setFromCamera(mouse,camera);
  const vis=allMeshes.filter(m=>m.visible && m.material.opacity>0.05);
  const hits=rc.intersectObjects(vis,false);
  if(hits.length) selectRegion(hits[0].object.userData.rid);
  else deselect();
});

// ═══════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════
const GROUPS={};
R.forEach(r=>{if(!GROUPS[r.group])GROUPS[r.group]=[];GROUPS[r.group].push(r);});
const sbList=document.getElementById('sb-list');
const allBtns={};
const layerClass=['lyr-0','lyr-1','lyr-2'];
const layerLabel=['Córtex','Subcortical','Profundo'];

function buildSidebar(filter=''){
  sbList.innerHTML='';
  const f=filter.toLowerCase();
  Object.entries(GROUPS).forEach(([grp,regs])=>{
    const matches=regs.filter(r=>!f||r.name.toLowerCase().includes(f)||r.latin.toLowerCase().includes(f));
    if(!matches.length) return;
    const g=document.createElement('div');
    g.innerHTML=`<div class="sb-group-title">${grp}</div>`;
    matches.forEach(r=>{
      const btn=document.createElement('button');
      btn.className='sb-btn'+(selId===r.id?' active':'');
      btn.dataset.id=r.id;
      btn.innerHTML=`<div class="sb-dot" style="background:${r.color}"></div>
        <div>
          <div class="sb-lbl">${r.name}<span class="sb-layer ${layerClass[r.layer]}">${layerLabel[r.layer]}</span></div>
          <div class="sb-lat">${r.latin}</div>
        </div>`;
      btn.addEventListener('click',()=>selectRegion(r.id));
      g.appendChild(btn); allBtns[r.id]=btn;
    });
    sbList.appendChild(g);
  });
}
buildSidebar();
document.getElementById('search').addEventListener('input',e=>buildSidebar(e.target.value));

function updateSidebarActive(id){
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  if(id && allBtns[id]) allBtns[id].scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ═══════════════════════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════════════════════
const layerBg=['#fde8e5','#fff8e1','#e8f5e9'];
const layerFg=['#c0392b','#b7821a','#2e7d32'];

function openPanel(id){
  const d=BY_ID[id]; if(!d) return;
  document.getElementById('p-tag').textContent=d.group;
  document.getElementById('p-tag').style.color=d.color;
  document.getElementById('p-name').textContent=d.name;
  document.getElementById('p-lat').textContent=d.latin;

  let h=`<div class="p-layer-badge" style="background:${layerBg[d.layer]};color:${layerFg[d.layer]}">${layerLabel[d.layer]}</div>`;
  h+=`<div class="s-title">Descrição</div><p class="s-desc">${d.desc}</p>`;
  h+=`<div class="s-title">Estruturas Principais</div>`;
  d.structs.forEach(s=>h+=`<div class="s-struct" style="--dot:${d.color}">${s}</div>`);
  h+=`<div class="s-title">Funções</div><div class="s-funcs">`;
  d.funcs.forEach(f=>h+=`<span class="s-func ${f.c}">${f.l}</span>`);
  h+=`</div>`;
  if(d.clinical) h+=`<div class="s-title">Correlação Clínica</div><div class="s-clinical"><p>${d.clinical}</p></div>`;
  h+=`<div style="height:18px"></div>`;

  document.getElementById('p-body').innerHTML=h;
  // Color the struct dots
  document.querySelectorAll('.s-struct::before').forEach(el=>el.style.background=d.color);
  document.querySelectorAll('.s-struct').forEach(el=>el.style.setProperty('--dot-color',d.color));
  document.getElementById('panel').classList.add('open');
}

// ═══════════════════════════════════════════════════════════════
// ORBIT CONTROLS
// ═══════════════════════════════════════════════════════════════
let drag=false,lx=0,ly=0,ry=0.2,rx=-0.06;
const hint=document.getElementById('hint');
let hintDone=false;

renderer.domElement.addEventListener('mousedown',e=>{
  drag=true;lx=e.clientX;ly=e.clientY;
  renderer.domElement.style.cursor='grabbing';
  if(!hintDone){hint.classList.add('gone');hintDone=true;}
});
window.addEventListener('mouseup',()=>{drag=false;renderer.domElement.style.cursor='grab';});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  ry+=(e.clientX-lx)*0.0065;
  rx+=(e.clientY-ly)*0.0065;
  rx=Math.max(-1.25,Math.min(1.25,rx));
  lx=e.clientX;ly=e.clientY;
});
renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();
  camera.position.z+=e.deltaY*0.011;
  camera.position.z=Math.max(3.5,Math.min(22,camera.position.z));
},{passive:false});

// Touch
let tl={x:0,y:0};
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;tl={x:e.touches[0].clientX,y:e.touches[0].clientY};if(!hintDone){hint.classList.add('gone');hintDone=true;}}});
renderer.domElement.addEventListener('touchend',()=>drag=false);
renderer.domElement.addEventListener('touchmove',e=>{
  if(!drag||e.touches.length!==1)return;
  ry+=(e.touches[0].clientX-tl.x)*0.0065;
  rx+=(e.touches[0].clientY-tl.y)*0.0065;
  rx=Math.max(-1.25,Math.min(1.25,rx));
  tl={x:e.touches[0].clientX,y:e.touches[0].clientY};
});

// Views
const VIEWS={
  'front':   {cy:0.4,cz:13.5,rx:-0.06,ry:0.1},
  'lat-r':   {cy:0.4,cz:12,rx:-0.08,ry:Math.PI/2-0.18},
  'lat-l':   {cy:0.4,cz:12,rx:-0.08,ry:-Math.PI/2+0.18},
  'top':     {cy:12,cz:1,rx:Math.PI/2-0.08,ry:0.1},
  'post':    {cy:0.4,cz:12,rx:-0.06,ry:Math.PI+0.08},
  'inf':     {cy:-11,cz:1,rx:-Math.PI/2+0.12,ry:0.1},
};
let va=null;
document.querySelectorAll('.vb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.vb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const v=VIEWS[btn.dataset.v]; if(!v)return;
    if(va)clearInterval(va);
    const s={cy:camera.position.y,cz:camera.position.z,rx,ry};
    let t=0; va=setInterval(()=>{
      t+=0.05; if(t>=1){t=1;clearInterval(va);}
      const e=1-Math.pow(1-t,3);
      camera.position.y=s.cy+(v.cy-s.cy)*e;
      camera.position.z=s.cz+(v.cz-s.cz)*e;
      rx=s.rx+(v.rx-s.rx)*e; ry=s.ry+(v.ry-s.ry)*e;
    },16);
    if(!hintDone){hint.classList.add('gone');hintDone=true;}
  });
});

// ═══════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  renderer.setSize(GW(),GH());
  camera.aspect=GW()/GH();
  camera.updateProjectionMatrix();
});

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  ROOT.rotation.x=rx; ROOT.rotation.y=ry;
  sun.intensity=1.5+0.07*Math.sin(clock.getElapsedTime()*0.45);
  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════════════════════════
// READY
// ═══════════════════════════════════════════════════════════════
setTimeout(()=>{
  const l=document.getElementById('loading');
  l.style.transition='opacity .5s';l.style.opacity='0';
  setTimeout(()=>l.remove(),500);
},1100);

animate();
</script>
